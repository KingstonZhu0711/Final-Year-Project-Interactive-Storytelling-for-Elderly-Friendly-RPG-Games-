<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>開始您的故事</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-size: 18px; }
        .theme-card { transition: all 0.2s; }
        .theme-card.selected {
            border-color: #4f46e5;
            background-color: #f0f0ff;
            transform: scale(1.05);
        }
    </style>
</head>
<body class="bg-white min-h-screen flex flex-col items-center justify-center font-sans p-8">

    <div class="max-w-2xl w-full bg-white rounded-3xl shadow-2xl p-10 text-center">
        <!-- University name at top -->
        <p class="text-sm font-medium text-gray-500 mb-1">香港理工大學</p>
        <h1 class="text-4xl font-bold text-gray-800 mb-2">互動式長者友好RPG故事創作系統</h1>
        <p class="text-2xl text-gray-600 mb-10">作者：朱金順</p>

        <form id="storyForm" action="/" method="POST">
            <input type="hidden" id="topic" name="topic" value="">

            <div class="mb-8">
                <h2 class="text-2xl font-semibold mb-4 text-gray-700">選擇您的故事主題</h2>
                <div class="grid grid-cols-3 gap-4">
                    <div onclick="selectTheme(this, 'peaceful village')" class="theme-card cursor-pointer border-4 border-transparent bg-white hover:border-emerald-200 text-emerald-700 font-medium py-6 rounded-2xl text-center">
                        平靜村莊生活
                    </div>
                    <div onclick="selectTheme(this, 'romantic')" class="theme-card cursor-pointer border-4 border-transparent bg-white hover:border-pink-200 text-pink-700 font-medium py-6 rounded-2xl text-center">
                        浪漫愛情故事
                    </div>
                    <div onclick="selectTheme(this, 'modern living life')" class="theme-card cursor-pointer border-4 border-transparent bg-white hover:border-blue-200 text-blue-700 font-medium py-6 rounded-2xl text-center">
                        現代生活
                    </div>
                </div>
            </div>

            <div class="mb-8">
                <h2 class="text-2xl font-semibold mb-4 text-gray-700">故事長度應為多少？</h2>
                <select name="length" class="w-full text-xl p-4 border-4 border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-500">
                    <option value="8">少於10段</option>
                    <option value="15" selected>10-20段</option>
                    <option value="25">多於20段</option>
                </select>
                <div class="mt-6">
                    <label class="block text-xl mb-2">或輸入精確段數：</label>
                    <input type="number" name="length_custom" min="5" max="50" value="15" class="w-full text-center text-xl p-4 border-4 border-gray-300 rounded-2xl">
                </div>
            </div>

            <button type="submit" class="mt-8 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-2xl py-6 rounded-3xl transition">
                開始故事
            </button>
        </form>
    </div>

    <script>
        function selectTheme(element, value) {
            document.querySelectorAll('.theme-card').forEach(card => card.classList.remove('selected'));
            element.classList.add('selected');
            document.getElementById('topic').value = value;
        }
    </script>
</body>
</html>
