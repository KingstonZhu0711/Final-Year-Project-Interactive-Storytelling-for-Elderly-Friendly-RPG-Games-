<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>故事</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-size: 18px; }
        .dialog-box {
            background-color: #f8f1e3;
            border: 6px solid #d4b483;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="bg-white min-h-screen flex flex-col items-center justify-center font-sans p-8">

    <!-- Story Title -->
    <div class="text-center mb-12">
        <p class="text-[30px] font-bold tracking-widest uppercase text-gray-700">{{ story_title }}</p>
    </div>

    <!-- Choices -->
    <div class="w-full max-w-2xl mb-12">
        <p class="text-center text-xl text-gray-700 mb-8">您想接下來做什麼？</p>
        <div class="space-y-6">
            {% for choice in choices %}
            <form action="/game" method="POST">
                <input type="hidden" name="choice" value="{{ choice }}">
                <button type="submit" class="w-full text-left px-10 py-7 text-xl font-medium border-4 border-gray-300 hover:border-indigo-600 hover:bg-indigo-50 rounded-3xl transition">
                    {{ choice }}
                </button>
            </form>
            {% endfor %}
        </div>
    </div>

    <!-- Scene Audio -->
    <div class="w-full max-w-2xl flex items-center gap-4 mb-12">
        <span class="font-medium text-gray-600 whitespace-nowrap">🔊 場景音頻</span>
        <audio id="storyAudio" controls class="flex-1">
            <source src="{{ audio }}" type="audio/mpeg">
        </audio>
        <button onclick="document.getElementById('storyAudio').play()" class="px-8 py-4 bg-amber-700 text-white font-medium rounded-2xl hover:bg-amber-800">
            播放完整場景
        </button>
    </div>

    <!-- Dialog Box -->
    <div class="w-full max-w-4xl">
        <div class="dialog-box rounded-3xl p-16 text-gray-800">
            <h2 class="text-3xl font-bold text-amber-900 mb-6">{{ character }}</h2>
            <p class="text-xl leading-relaxed whitespace-pre-wrap">{{ script | replace('\n', '<br>') | safe }}</p>
        </div>
    </div>

    <!-- Scene number -->
    <div class="mt-12 text-sm text-gray-500">
        場景 {{ scene_num }} / {{ total_scenes }}
    </div>

</body>
</html>
